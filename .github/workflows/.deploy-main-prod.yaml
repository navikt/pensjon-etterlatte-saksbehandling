name: .deploy-main-prod.yaml

on:
  workflow_call:
    inputs:
      applikasjon:
        description: 'Navnet på applikasjonen'
        required: true
        type: string

env:
  image: europe-north1-docker.pkg.dev/nais-management-233d/etterlatte/pensjon-etterlatte-saksbehandling-etterlatte-${{ inputs.applikasjon }}:main

jobs:
  deploy-main:
    name: deploy-main-prod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # ratchet:nais/deploy/actions/deploy@v2
        env:
          TELEMETRY: ${{ steps.docker-build-push.outputs.telemetry }}
          CLUSTER: prod-gcp
          RESOURCE: apps/etterlatte-${{ inputs.applikasjon }}/.nais/prod.yaml
          VAR: image=${{ env.image }}
