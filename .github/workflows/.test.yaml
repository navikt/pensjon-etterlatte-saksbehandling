name: .test.yaml

on:
  workflow_call:

jobs:
  determine-project-type:
    name: Determine project type
    runs-on: ubuntu-latest-8-cores
    outputs:
      type: ${{ steps.determine.outputs.type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - id: determine
        working-directory: apps/${{ github.workflow }}
        run: |
          if [ -f "package.json" ]; then
            echo "type=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "type=backend" >> "$GITHUB_OUTPUT"
          fi

  verify-backend:
    name: Verify pull request
    if: needs.determine-project-type.outputs.type == 'backend'
    needs: [determine-project-type]
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # ratchet:gradle/actions/setup-gradle@v6.1.0
        with:
          cache-provider: basic
      - name: Gradle test and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :apps:${{ github.workflow }}:test --stacktrace --configuration-cache

  verify-frontend:
    name: Verify pull request
    if: needs.determine-project-type.outputs.type == 'frontend'
    needs: [determine-project-type]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com'
      - name: Install client
        working-directory: apps/${{ github.workflow }}
        run: yarn --cwd client install --frozen-lockfile && yarn --cwd client build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Install server
        working-directory: apps/${{ github.workflow }}
        run: yarn --cwd server install --frozen-lockfile && yarn --cwd server build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Run tests
        working-directory: apps/${{ github.workflow }}/client
        run: CI=true yarn test
