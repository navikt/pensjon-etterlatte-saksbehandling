name: .test.yaml

on:
  workflow_call:

jobs:
  determine-project-type:
    name: Determine project type
    runs-on: ubuntu-latest-8-cores
    outputs:
      type: ${{ steps.determine.outputs.type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - id: determine
        working-directory: apps/${{ github.workflow }}
        run: |
          if [ -f "package.json" ]; then
            echo "type=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "type=backend" >> "$GITHUB_OUTPUT"
          fi

  verify-backend:
    name: Verify pull request
    if: needs.determine-project-type.outputs.type == 'backend'
    needs: [determine-project-type]
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # ratchet:gradle/actions/setup-gradle@v5
      - name: Gradle test and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :apps:${{ github.workflow }}:test --stacktrace --configuration-cache

  verify-frontend:
    name: Verify pull request
    if: needs.determine-project-type.outputs.type == 'frontend'
    needs: [determine-project-type]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
          cache-dependency-path: apps/${{ github.workflow }}/client/yarn.lock
      - name: Install client
        working-directory: apps/${{ github.workflow }}
        run: yarn --cwd client install --frozen-lockfile && yarn --cwd client build
      - name: Install server
        working-directory: apps/${{ github.workflow }}
        run: yarn --cwd server install --frozen-lockfile && yarn --cwd server build
      - name: Run tests
        working-directory: apps/${{ github.workflow }}/client
        run: CI=true yarn test
