apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: vedtakshendelser
  namespace: etterlatte
  labels:
    team: etterlatte
spec:
  pool: nav-dev
  config: # optional; all fields are optional too; defaults shown
    cleanupPolicy: delete  # delete, compact
    minimumInSyncReplicas: 2
    partitions: 1
    replication: 3  # see min/max requirements
    retentionBytes: -1  # -1 means unlimited
    retentionHours: 168  # -1 means unlimited
  acl:
    - team: etterlatte
      application: etterlatte-behandling
      access: readwrite
    - team: etterlatte
      application: etterlatte-vedtaksvurdering
      access: readwrite
    - team: pensjon-q0
      application: pensjon-pen-q0
      access: read
    - team: pensjon-q1
      application: pensjon-pen-q1
      access: read
    - team: pensjon-q2
      application: pensjon-pen-q2
      access: read
    - team: pensjon-q5
      application: pensjon-pen-q5
      access: read